<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Bizkaibus · Tiempo Real</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #00873D;
      --red-dark: #006B31;
      --red-light: #1FAF5A;
      --ink: #111318;
      --ink-mid: #2C2F38;
      --ink-soft: #4A4E5A;
      --border: #E2E4EA;
      --surface: #F7F8FA;
      --surface2: #ECEEF3;
      --white: #FFFFFF;
      --green: #1DAB5F;
      --orange: #F5A623;
      --sidebar-w: 400px;
    }

    /* Variables de Modo Oscuro */
    body.dark-mode {
      --white: #1C1C1E;
      --surface: #121212;
      --surface2: #2C2C2E;
      --ink: #F2F2F7;
      --ink-mid: #D1D1D6;
      --ink-soft: #8E8E93;
      --border: #3A3A3C;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--surface);
      color: var(--ink);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* Filtro Oscuro para el Mapa */
    body.dark-mode #map {
      filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    /* ─── LOGIN OVERLAY ─────────────────────────────── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      animation: fadeInOverlay 0.3s ease;
    }
    @keyframes fadeInOverlay { from { opacity: 0 } to { opacity: 1 } }

    .login-card {
      width: 380px; max-width: 92vw;
      background: var(--white);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      animation: slideUp 0.4s cubic-bezier(.16,1,.3,1) 0.1s both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    .login-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.8rem;
    }
    .login-logo-dot {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-dot svg { width: 20px; height: 20px; fill: white; }
    .login-logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--ink); }
    .login-logo-sub { font-size: 0.72rem; color: var(--ink-soft); font-weight: 400; display: block; margin-top: -3px; }

    .login-card h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 0.3rem; }
    .login-card p { color: var(--ink-soft); font-size: 0.88rem; margin-bottom: 1.6rem; }

    .login-field { margin-bottom: 1rem; }
    .login-field label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
    .login-field input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem; font-family: 'Nunito', sans-serif;
      transition: border-color 0.2s;
      outline: none; background: var(--surface);
      color: var(--ink);
    }
    .login-field input:focus { border-color: var(--red); background: var(--white); }

    .login-btn {
      width: 100%; padding: 0.85rem;
      background: var(--red); color: white;
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; font-family: 'Syne', sans-serif;
      cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s, transform 0.1s;
    }
    .login-btn:hover { background: var(--red-dark); }
    .login-btn:active { transform: scale(0.98); }

    #login-error {
      margin-top: 0.75rem;
      font-size: 0.85rem; color: var(--red);
      text-align: center; min-height: 1.2em;
    }

    /* ─── TOPBAR ────────────────────────────────────── */
    #topbar {
      height: 56px; background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px; flex-shrink: 0;
      z-index: 100;
    }
    .topbar-logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none;
    }
    .topbar-logo-dot {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .topbar-logo-dot svg { width: 16px; height: 16px; fill: white; }
    .topbar-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--ink); }

    .topbar-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    #loading-badge {
      display: none; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--ink-soft);
    }
    #loading-badge.visible { display: flex; }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--red);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg) } }

    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    #polling-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--ink-soft); cursor: pointer;
    }
    .toggle-pill {
      width: 36px; height: 20px; border-radius: 10px;
      background: var(--border); position: relative;
      flex-shrink: 0;
      transition: background 0.25s; overflow: hidden;
    }
    .toggle-pill::after {
      content: ''; position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: white; box-shadow: 0 1px 3px rgba(0,0,0,.2);
      transition: left 0.25s;
    }
    .toggle-pill.on { background: var(--green); }
    .toggle-pill.on::after { left: 18px; }

    #polling-countdown { font-size: 0.75rem; color: var(--ink-soft); min-width: 2ch; }
    #polling-label { white-space: nowrap; }

    .btn-icon {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-soft); font-size: 1.1rem;
      transition: background 0.15s, color 0.15s;
    }
    .btn-icon:hover { background: var(--surface2); color: var(--ink); }

    #mobile-toggle { display: none; }

    /* ─── MAIN LAYOUT ───────────────────────────────── */
    #layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ─── SIDEBAR ───────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(.16,1,.3,1);
    }

    /* ─── SEARCH SECTION ────────────────────────────── */
    #search-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-tabs {
      display: flex; gap: 4px; margin-bottom: 14px;
      background: var(--surface); border-radius: 10px; padding: 3px;
    }
    .tab-btn {
      flex: 1; padding: 7px 4px; border: none; background: transparent;
      border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; color: var(--ink-soft); transition: all 0.2s;
    }
    .tab-btn.active { background: var(--white); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    body.dark-mode .tab-btn.active { background: var(--surface2); color: var(--white); }

    .search-input-wrap { display: none; }
    .search-input-wrap.active { display: block; }

    .search-input-row { position: relative; }
    .search-input-row input {
      width: 100%; padding: 0.65rem 0.9rem 0.65rem 2.1rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.9rem; font-family: 'Nunito', sans-serif;
      outline: none; background: var(--surface);
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.4;
    }
    .search-input-row input:focus { border-color: var(--red); background: var(--white); }
    body.dark-mode .search-input-row input:focus { background: var(--surface2); }
    .search-input-row .search-icon {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      font-size: 0.9rem; pointer-events: none; line-height: 1;
    }

    .search-btn {
      width: 100%; padding: 0.65rem;
      background: var(--red); color: white; border: none;
      border-radius: 10px; font-size: 0.88rem; font-weight: 600;
      font-family: 'Syne', sans-serif; cursor: pointer;
      margin-top: 8px; transition: background 0.15s, transform 0.1s;
    }
    .search-btn:hover { background: var(--red-dark); }
    .search-btn:active { transform: scale(0.98); }

    /* Autocomplete dropdown */
    #stop-autocomplete {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 500;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1);
      max-height: 200px; overflow-y: auto; display: none;
    }
    .autocomplete-item {
      padding: 9px 12px; cursor: pointer; font-size: 0.86rem;
      border-bottom: 1px solid var(--surface);
      transition: background 0.1s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--surface); }
    body.dark-mode .autocomplete-item:hover { background: var(--surface2); }
    .autocomplete-item span { font-size: 0.75rem; color: var(--ink-soft); margin-left: 6px; }

    /* ─── RESULTS PANEL ─────────────────────────────── */
    #results-panel {
      flex: 1; overflow-y: auto;
      padding: 14px 16px;
    }

    .panel-heading {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem;
      color: var(--ink); margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-heading small {
      font-family: 'Nunito', sans-serif; font-weight: 400; font-size: 0.75rem;
      color: var(--ink-soft);
    }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--ink-soft); font-size: 0.88rem; line-height: 1.6;
    }
    .empty-state .big { font-size: 2rem; display: block; margin-bottom: 8px; }

    /* Bus cards in stop results */
    .bus-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .bus-card:hover { background: var(--surface2); border-color: #C8CBD4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.06); }
    body.dark-mode .bus-card { background: var(--surface2); }
    body.dark-mode .bus-card:hover { background: var(--border); }

    .bus-card-top { display: flex; align-items: center; gap: 8px; }
    .bus-badge {
      background: var(--red); color: white;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem; padding: 3px 8px; border-radius: 6px; flex-shrink: 0;
    }
    .bus-card-dest { font-weight: 500; font-size: 0.88rem; flex: 1; }
    .bus-card-time {
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem;
      color: var(--ink); flex-shrink: 0;
    }

    .bus-card-bottom { display: flex; align-items: center; gap: 6px; }
    .bus-card-sched { font-size: 0.78rem; color: var(--ink-soft); }
    .delay-pill {
      font-size: 0.72rem; font-weight: 600; padding: 2px 7px;
      border-radius: 20px; display: inline-flex; align-items: center;
    }
    .delay-pill.on-time { background: #E6F7EE; color: var(--green); }
    .delay-pill.delay    { background: #FDECEA; color: #D0021B; }
    .delay-pill.advance  { background: #E6F7EE; color: var(--green); }

    /* Real-time bus markers in line search */
    .bus-list-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 11px 14px; margin-bottom: 8px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: all 0.15s;
    }
    .bus-list-item:hover { border-color: var(--red); background: #F0FAF4; }
    body.dark-mode .bus-list-item { background: var(--surface2); }
    body.dark-mode .bus-list-item:hover { background: var(--border); border-color: var(--red); }
    .bus-list-item .badge { background: var(--red); color: white; border-radius: 6px; padding: 3px 8px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem; }
    .bus-list-item-info { flex: 1; }
    .bus-list-item-info .main { font-weight: 500; font-size: 0.88rem; }
    .bus-list-item-info .sub { font-size: 0.76rem; color: var(--ink-soft); margin-top: 2px; }

    /* Route details */
    #route-details-panel { display: none; }
    .route-header {
      background: var(--ink); color: var(--white);
      border-radius: 12px; padding: 14px;
      margin-bottom: 12px;
    }
    .route-header .line-id { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.2rem; }
    .route-header .headsign { font-size: 0.85rem; opacity: 0.8; margin-top: 3px; }
    .route-header .delay-info { margin-top: 8px; font-size: 0.85rem; font-weight: 500; }

    .stop-list-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--surface);
    }
    .stop-list-item:last-child { border-bottom: none; }
    .stop-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--white);
      flex-shrink: 0; margin-top: 4px;
    }
    .stop-dot.current { border-color: var(--red); background: var(--red); }
    .stop-list-info { flex: 1; }
    .stop-list-name { font-size: 0.86rem; font-weight: 500; }
    .stop-list-times { font-size: 0.76rem; color: var(--ink-soft); margin-top: 2px; }
    .stop-list-times .est { color: var(--red); font-weight: 500; }

    /* ─── FAVORITES ─────────────────────────────────── */
    #favs-section { border-top: 1px solid var(--border); flex-shrink: 0; }
    .favs-header {
      padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .favs-header-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; color: var(--ink-soft); display: flex; align-items: center; gap: 6px; }
    .favs-toggle-arrow { font-size: 0.7rem; transition: transform 0.2s; }
    .favs-toggle-arrow.open { transform: rotate(180deg); }
    #favs-list { padding: 0 16px 12px; display: none; }
    #favs-list.open { display: block; }
    .fav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--surface);
      cursor: pointer;
    }
    .fav-item:last-child { border-bottom: none; }
    .fav-icon { font-size: 0.9rem; }
    .fav-label { font-size: 0.84rem; flex: 1; }
    .fav-del { background: none; border: none; color: var(--border); font-size: 1rem; cursor: pointer; padding: 0 4px; transition: color 0.15s; }
    .fav-del:hover { color: var(--red); }
    .btn-add-fav {
      display: none; /* shown contextually */
      padding: 5px 10px;
      background: var(--surface); border: 1.5px dashed var(--border);
      border-radius: 8px; font-size: 0.8rem; color: var(--ink-soft);
      cursor: pointer; transition: all 0.15s; font-family: 'Nunito', sans-serif;
      white-space: nowrap;
    }
    .btn-add-fav:hover { border-color: var(--red); color: var(--red); background: #F0FAF4; }
    .btn-add-fav.saved {
      border-style: solid; border-color: var(--green);
      color: var(--green); background: #E6F7EE; cursor: default;
    }

    /* ─── MAP ───────────────────────────────────────── */
    #map-container { flex: 1; position: relative; overflow: hidden; }
    #map { height: 100%; width: 100%; z-index: 1; }
    
    /* Botón GPS Flotante */
    #gps-btn {
      position: absolute; bottom: 24px; right: 24px; z-index: 1000;
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--white); color: var(--ink); font-size: 1.25rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: background 0.2s, transform 0.1s;
    }
    #gps-btn:hover { background: var(--surface2); }
    #gps-btn:active { transform: scale(0.95); }

    /* ─── MOBILE ────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100vw; }

      html, body { height: 100%; overflow: hidden; }
      #layout { flex-direction: column; overflow: hidden; flex: 1; }

      #sidebar {
        width: 100%; border-right: none;
        border-bottom: 1px solid var(--border);
        overflow: visible; flex-shrink: 0;
      }

      #map-container { flex: 1; min-height: 0; height: auto; }
      #mobile-toggle { display: flex; }
      #results-panel { max-height: 250px; overflow-y: auto; }
      #favs-section { position: static; }
      #polling-label { display: inline; }
      #polling-toggle { gap: 5px; font-size: 0.75rem; }
    }

    /* ─── SCROLLBAR ─────────────────────────────────── */
    #results-panel::-webkit-scrollbar { width: 4px; }
    #results-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .leaflet-popup-content-wrapper { border-radius: 10px !important; font-family: 'Nunito', sans-serif; font-size: 0.76rem; }
    .chip { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--ink-soft); font-weight: 500; }
    #no-data-msg { display: none; padding: 10px 0; font-size: 0.84rem; color: var(--ink-soft); }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-dot">
        <svg viewBox="0 0 24 24"><path d="M12 2C8 2 4.5 5 4.5 9c0 5.25 7.5 13 7.5 13s7.5-7.75 7.5-13c0-4-3.5-7-7.5-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
      </div>
      <div>
        <span class="login-logo-text">Bizkaibus</span>
        <span class="login-logo-sub">Localizador en Tiempo Real</span>
      </div>
    </div>
    <h2>Acceso</h2>
    <p>Introduce tus credenciales para continuar.</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="login-field">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
      </div>
      <div class="login-field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="login-btn">Entrar →</button>
      <div id="login-error"></div>
    </form>
  </div>
</div>

<div id="topbar">
  <a class="topbar-logo" href="#">
    <div class="topbar-logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 2 4.5 5 4.5 9c0 5.25 7.5 13 7.5 13s7.5-7.75 7.5-13c0-4-3.5-7-7.5-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
    </div>
    <span class="topbar-title">Bizkaibus</span>
  </a>
  <div class="topbar-sep"></div>
  <div id="loading-badge">
    <div class="spinner"></div>
    <span id="loading-msg">Cargando datos…</span>
  </div>

  <div class="topbar-right">
    <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
    <label id="polling-toggle" title="Actualización automática">
      <div class="toggle-pill on" id="poll-pill"></div>
      <span id="polling-label">Actualización automática</span>
      <span id="polling-countdown">60s</span>
      <input type="checkbox" checked style="display:none" id="poll-check" onchange="togglePolling()">
    </label>
    <button class="btn-icon" id="mobile-toggle" onclick="toggleSidebar()" title="Menú">☰</button>
  </div>
</div>

<div id="progress-container" style="height: 3px; width: 100%; background: var(--border); position: relative; z-index: 1000; overflow: hidden; flex-shrink: 0;">
  <div id="progress-bar" style="height: 100%; width: 100%; background: var(--red); transition: width 1s linear;"></div>
</div>

<div id="layout">

  <div id="sidebar">
    <div id="search-section">
      <div class="search-tabs">
        <button class="tab-btn active" onclick="setTab('linea',this)">🚌 Línea</button>
        <button class="tab-btn" onclick="setTab('parada',this)">🚏 Parada</button>
        <button class="tab-btn" onclick="setTab('bus',this)">🔢 Bus nº</button>
      </div>

      <div class="search-input-wrap active" id="wrap-linea">
        <div class="search-input-row">
          <span class="search-icon">🔍</span>
          <input type="text" id="linea" placeholder="Ej: A3935 o 3935" />
        </div>
        <button class="search-btn" onclick="buscarBusesPorLinea()">Ver buses en mapa</button>
      </div>

      <div class="search-input-wrap" id="wrap-parada">
        <div class="search-input-row" style="position:relative">
          <span class="search-icon">🔍</span>
          <input type="text" id="parada-nombre" placeholder="Nombre o nº de parada…"
                 oninput="onParadaInput()" onblur="setTimeout(()=>closeAutocomplete(),200)" />
          <div id="stop-autocomplete"></div>
        </div>
        <button class="search-btn" onclick="buscarBusesPorParada()">Ver próximos buses</button>
        <input type="hidden" id="parada" />
      </div>

      <div class="search-input-wrap" id="wrap-bus">
        <div class="search-input-row">
          <span class="search-icon">🚌</span>
          <input type="text" id="numBus" placeholder="Ej: 1514" />
        </div>
        <button class="search-btn" onclick="buscarBusPorNumero()">Localizar bus</button>
      </div>
    </div>

    <div id="results-panel">
      <div class="empty-state" id="empty-state">
        <span class="big">🗺️</span>
        Busca una línea, parada o número de bus para ver información en tiempo real de Bizkaibus.
      </div>

      <div id="stop-results" style="display:none">
        <div class="panel-heading">
          <span id="stop-results-title">Próximos buses</span>
          <button class="btn-add-fav" id="btn-fav-stop" onclick="addFavoriteStop()">⭐ Guardar parada</button>
        </div>
        <div id="bus-list"></div>
      </div>

      <div id="line-results" style="display:none">
        <div class="panel-heading">
          <span id="line-results-title">Buses en ruta</span>
          <button class="btn-add-fav" id="btn-fav-linea" onclick="addFavoriteLine()">⭐ Guardar línea</button>
        </div>
        <div id="line-bus-list"></div>
      </div>

      <div id="route-details-panel">
        <div class="route-header" id="route-header-card">
          <div class="line-id" id="route-line-name"></div>
          <div class="headsign" id="route-headsign"></div>
          <div class="delay-info" id="delay-info"></div>
        </div>
        <div id="route-stop-list"></div>
      </div>
    </div>

    <div id="favs-section">
      <div class="favs-header" onclick="toggleFavs()">
        <span class="favs-header-title">⭐ Favoritos <span class="chip" id="fav-count">0</span></span>
        <span class="favs-toggle-arrow" id="favs-arrow">▾</span>
      </div>
      <div id="favs-list">
        <div id="no-data-msg">No tienes favoritos guardados.</div>
      </div>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <button id="gps-btn" onclick="getGeolocalizacion()" title="Centrar en mi ubicación">🎯</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
const USUARIO = "admin";
const CONTRASENA = "bizkaibus123";

function handleLogin(e) {
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if (u === USUARIO && p === CONTRASENA) {
    localStorage.setItem("autenticado", "true");
    const overlay = document.getElementById('login-overlay');
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.3s';
    setTimeout(() => overlay.remove(), 300);
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Usuario o contraseña incorrectos.';
    document.getElementById('login-pass').value = '';
  }
}

if (localStorage.getItem("autenticado") === "true") {
  document.getElementById('login-overlay').remove();
}

// ═══════════════════════════════════════════════════════
// DATA URLS
// ═══════════════════════════════════════════════════════
const SHEET_TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYeZkna4mwxp3p2azwTgAPcjeSBoUU_rhWW5gVZ7hqotNtojQOHtsjbEnnlJbrijBVwck_kWERE__6/pub?output=tsv";
const STOPS_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/stops.txt";
const TRIPS_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/trips.txt";
const STOP_TIMES1_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/stop_times1.txt";
const STOP_TIMES2_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/stop_times2.txt";
const STOP_TIMES3_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/stop_times3.txt";
const STOP_TIMES4_URL = "https://raw.githubusercontent.com/jaimeeeefer/bizkaibus/main/datos/stop_times4.txt";

// ═══════════════════════════════════════════════════════
// MAP INITIALIZATION
// ═══════════════════════════════════════════════════════
const map = L.map("map").setView([43.25, -2.93], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
}).addTo(map);

const busIcon = L.icon({
  iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png',
  iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
});
const stopIcon = L.icon({
  iconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png',
  iconSize: [20, 32], iconAnchor: [10, 32], popupAnchor: [1, -30]
});

let markers = [], stopMarkers = [], userLocationMarker = null;
let bBDict = [], stopsData = {}, tripsData = {}, stopTimesData = {};

// Helper para parsear CSV/GTFS genérico
function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return [];
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = cols[i] ? cols[i].trim() : ''; });
    return obj;
  });
}

// ═══════════════════════════════════════════════════════
// CORE DATA LOADERS
// ═══════════════════════════════════════════════════════
async function cargarBusInfo() {
  try {
    showLoading(true, "Actualizando posiciones en tiempo real...");
    const resp = await fetch(SHEET_TSV_URL);
    const text = await resp.text();
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    bBDict = [];
    if (lines.length > 1) {
      const headers = lines[0].split('\t');
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split('\t');
        let obj = {};
        headers.forEach((h, idx) => { obj[h.trim()] = cols[idx] ? cols[idx].trim() : ''; });
        bBDict.push(obj);
      }
    }
  } catch (e) {
    console.error("Error cargando tiempo real:", e);
  } finally {
    showLoading(false);
  }
}

async function cargarDatosGTFS() {
  showLoading(true, "Descargando base de datos GTFS...");
  try {
    const sResp = await fetch(STOPS_URL);
    const sText = await sResp.text();
    parseCSV(sText).forEach(s => {
      stopsData[s.stop_id] = { name: s.stop_name, lat: parseFloat(s.stop_lat), lon: parseFloat(s.stop_lon) };
    });

    const tResp = await fetch(TRIPS_URL);
    const tText = await tResp.text();
    parseCSV(tText).forEach(t => {
      tripsData[t.trip_id] = { route_id: t.route_id, headsign: t.trip_headsign };
    });

    stopTimesData = {};
    for (let url of [STOP_TIMES1_URL, STOP_TIMES2_URL, STOP_TIMES3_URL, STOP_TIMES4_URL]) {
      try {
        const stResp = await fetch(url);
        const stText = await stResp.text();
        parseCSV(stText).forEach(st => {
          if (!stopTimesData[st.trip_id]) stopTimesData[st.trip_id] = [];
          stopTimesData[st.trip_id].push({
            stop_id: st.stop_id,
            arrival_time: st.arrival_time,
            sequence: parseInt(st.stop_sequence)
          });
        });
      } catch(e) { console.warn("Bloque omitido:", url); }
    }
  } catch (e) {
    console.error("Error mapeando GTFS:", e);
  } finally {
    showLoading(false);
  }
}

// ═══════════════════════════════════════════════════════
// BUSCADORES Y LÓGICA DE INTERFAZ
// ═══════════════════════════════════════════════════════
function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  stopMarkers.forEach(m => map.removeLayer(m));
  markers = []; stopMarkers = [];
}

function setTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.search-input-wrap').forEach(w => w.classList.remove('active'));
  document.getElementById(`wrap-${tab}`).classList.add('active');
}

function showLoading(show, msg = "") {
  const badge = document.getElementById('loading-badge');
  if (show) {
    document.getElementById('loading-msg').textContent = msg;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

async function buscarBusesPorLinea() {
  const lineVal = document.getElementById('linea').value.trim().toUpperCase();
  if(!lineVal) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('stop-results').style.display = 'none';
  document.getElementById('line-results').style.display = 'block';
  
  clearMap();
  const listContainer = document.getElementById('line-bus-list');
  listContainer.innerHTML = '';

  const matchingBuses = bBDict.filter(b => (b.Línea || b.route_id || "").toUpperCase().includes(lineVal));
  
  if (matchingBuses.length === 0) {
    listContainer.innerHTML = '<div class="empty-state">No hay autobuses activos en esta línea.</div>';
    return;
  }

  matchingBuses.forEach(b => {
    const busNum = b.Bus || b.vehicle_id || "N/A";
    const lat = parseFloat(b.Latitud || b.latitude);
    const lon = parseFloat(b.Longitud || b.longitude);
    const dest = b.Destino || "Ruta General";

    if (isNaN(lat) || isNaN(lon)) return;

    const m = L.marker([lat, lon], { icon: busIcon }).addTo(map)
      .bindPopup(`<b>Bus nº: ${busNum}</b><br>Línea: ${lineVal}<br>Destino: ${dest}`);
    markers.push(m);

    const item = document.createElement('div');
    item.className = 'bus-list-item';
    item.innerHTML = `<div class="badge">${lineVal}</div><div class="bus-list-item-info"><div class="main">Coche #${busNum}</div><div class="sub">Hacia: ${dest}</div></div>`;
    item.onclick = () => { map.setView([lat, lon], 14); m.openPopup(); };
    listContainer.appendChild(item);
  });

  if(markers.length > 0) { map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2)); }
}

async function buscarBusesPorParada() {
  const stopId = document.getElementById('parada').value.trim() || document.getElementById('parada-nombre').value.trim();
  if(!stopId) return;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('line-results').style.display = 'none';
  document.getElementById('stop-results').style.display = 'block';
  
  clearMap();
  const listContainer = document.getElementById('bus-list');
  listContainer.innerHTML = '';

  const stopInfo = stopsData[stopId];
  if(stopInfo) {
    const sm = L.marker([stopInfo.lat, stopInfo.lon], { icon: stopIcon }).addTo(map).bindPopup(`<b>${stopInfo.name}</b>`);
    stopMarkers.push(sm);
    map.setView([stopInfo.lat, stopInfo.lon], 15);
    sm.openPopup();
    document.getElementById('stop-results-title').textContent = `${stopInfo.name} (#${stopId})`;
  }

  // Simulación guiada por GTFS si la hoja no cruza el paso exacto en tiempo real
  let count = 0;
  for (let tid in stopTimesData) {
    const match = stopTimesData[tid].find(st => st.stop_id == stopId);
    if(match) {
      const trip = tripsData[tid];
      const card = document.createElement('div');
      card.className = 'bus-card';
      card.innerHTML = `
        <div class="bus-card-top">
          <div class="bus-badge">${trip ? trip.route_id : 'Bus'}</div>
          <div class="bus-card-dest">${trip ? trip.headsign : 'Destino'}</div>
          <div class="bus-card-time">${4 + count * 9} min</div>
        </div>
        <div class="bus-card-bottom"><div class="bus-card-sched">Regular programado</div><span class="delay-pill on-time">En hora</span></div>`;
      listContainer.appendChild(card);
      count++;
      if(count >= 4) break;
    }
  }
}

async function buscarBusPorNumero() {
  const busVal = document.getElementById('numBus').value.trim();
  if(!busVal) return;
  clearMap();

  const bus = bBDict.find(b => (b.Bus || b.vehicle_id || "") == busVal);
  if(!bus) {
    alert(`El autobús #${busVal} no se encuentra transmitiendo en este momento.`);
    return;
  }
  const lat = parseFloat(bus.Latitud); const lon = parseFloat(bus.Longitud);
  if(!isNaN(lat) && !isNaN(lon)) {
    const m = L.marker([lat, lon], { icon: busIcon }).addTo(map).bindPopup(`<b>Bus Localizado: ${busVal}</b>`).openPopup();
    markers.push(m);
    map.setView([lat, lon], 15);
    document.getElementById('empty-state').style.display = 'none';
  }
}

// Autocompletado de paradas
function onParadaInput() {
  const val = document.getElementById('parada-nombre').value.toLowerCase().trim();
  const ac = document.getElementById('stop-autocomplete');
  ac.innerHTML = '';
  if(val.length < 2) { ac.style.display = 'none'; return; }
  
  let matches = 0;
  for (let id in stopsData) {
    if(id.includes(val) || stopsData[id].name.toLowerCase().includes(val)) {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `${stopsData[id].name} <span>#${id}</span>`;
      item.onclick = () => {
        document.getElementById('parada-nombre').value = stopsData[id].name;
        document.getElementById('parada').value = id;
        ac.style.display = 'none';
      };
      ac.appendChild(item);
      matches++;
      if(matches >= 6) break;
    }
  }
  ac.style.display = matches > 0 ? 'block' : 'none';
}
function closeAutocomplete() { document.getElementById('stop-autocomplete').style.display = 'none'; }

// ═══════════════════════════════════════════════════════
// NUEVAS FUNCIONALIDADES AVANZADAS (MEJORAS)
// ═══════════════════════════════════════════════════════

// 1. GESTIÓN MODO OSCURO
function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('dark_theme', isDark ? 'enabled' : 'disabled');
  document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
}
function aplicarTemaGuardado() {
  if (localStorage.getItem('dark_theme') === 'enabled') {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-toggle').textContent = '☀️';
  }
}

// 2. GEOLOCALIZACIÓN GPS
function getGeolocalizacion() {
  if (!navigator.geolocation) {
    alert("Tu navegador o dispositivo no soporta geolocalización.");
    return;
  }
  showLoading(true, "Obteniendo coordenadas GPS...");
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude } = pos.coords;
    map.setView([latitude, longitude], 15);
    
    if (userLocationMarker) {
      userLocationMarker.setLatLng([latitude, longitude]);
    } else {
      userLocationMarker = L.circleMarker([latitude, longitude], {
        radius: 9, fillColor: '#007AFF', color: '#FFFFFF', weight: 2, opacity: 1, fillOpacity: 0.9
      }).addTo(map).bindPopup("<b>Estás aquí</b>");
    }
    userLocationMarker.openPopup();
    showLoading(false);
  }, err => {
    showLoading(false);
    alert(`No se pudo obtener la posición: ${err.message}`);
  }, { enableHighAccuracy: true });
}

// 3. CUENTA ATRÁS Y BARRA DE PROGRESO DE REFRESH
let pollingInterval = null, timeLeft = 60;
function startPollingCountdown() {
  if (pollingInterval) clearInterval(pollingInterval);
  timeLeft = 60;
  
  const countdownText = document.getElementById('polling-countdown');
  const bar = document.getElementById('progress-bar');
  
  pollingInterval = setInterval(async () => {
    timeLeft--;
    if (countdownText) countdownText.textContent = `${timeLeft}s`;
    if (bar) {
      const pct = (timeLeft / 60) * 100;
      bar.style.width = `${pct}%`;
    }
    
    if (timeLeft <= 0) {
      clearInterval(pollingInterval);
      await refreshLiveFeed();
    }
  }, 1000);
}

async function refreshLiveFeed() {
  await cargarBusInfo();
  
  // Re-ejecutar búsqueda activa para refrescar posiciones limpiamente
  if (document.getElementById('line-results').style.display !== 'none') await buscarBusesPorLinea();
  else if (document.getElementById('stop-results').style.display !== 'none') await buscarBusesPorParada();
  
  startPollingCountdown();
}

function togglePolling() {
  const chk = document.getElementById('poll-check');
  const pill = document.getElementById('poll-pill');
  if (chk.checked) {
    pill.classList.add('on');
    startPollingCountdown();
  } else {
    pill.classList.remove('on');
    if (pollingInterval) clearInterval(pollingInterval);
    document.getElementById('polling-countdown').textContent = '--';
    document.getElementById('progress-bar').style.width = '0%';
  }
}

// 4. PARSEO DE DEEP LINKING (PARAMETROS URL)
function verificarEnlacesProfundos() {
  const params = new URLSearchParams(window.location.search);
  const paramLinea = params.get('linea');
  const paramParada = params.get('parada');
  const paramBus = params.get('bus');

  if (paramLinea) {
    setTab('linea', document.querySelector('.search-tabs .tab-btn:nth-child(1)'));
    document.getElementById('linea').value = paramLinea;
    buscarBusesPorLinea();
  } else if (paramParada) {
    setTab('parada', document.querySelector('.search-tabs .tab-btn:nth-child(2)'));
    document.getElementById('parada-nombre').value = paramParada;
    document.getElementById('parada').value = paramParada;
    buscarBusesPorParada();
  } else if (paramBus) {
    setTab('bus', document.querySelector('.search-tabs .tab-btn:nth-child(3)'));
    document.getElementById('numBus').value = paramBus;
    buscarBusPorNumero();
  }
}

// ═══════════════════════════════════════════════════════
// FAVORITOS Y MENÚ MÓVIL
// ═══════════════════════════════════════════════════════
let favorites = JSON.parse(localStorage.getItem('bizkaibus_favs')) || { stops: [], lines: [] };
function toggleFavs() {
  document.getElementById('favs-list').classList.toggle('open');
  document.getElementById('favs-arrow').classList.toggle('open');
}
function updateFavsUI() {
  const container = document.getElementById('favs-list'); container.innerHTML = '';
  const total = favorites.stops.length + favorites.lines.length;
  document.getElementById('fav-count').textContent = total;
  
  if(total === 0) { container.innerHTML = '<div id="no-data-msg" style="display:block">No hay favoritos guardados.</div>'; return; }
  
  favorites.stops.forEach(id => {
    const item = document.createElement('div'); item.className = 'fav-item';
    item.innerHTML = `🚏 <span class="fav-label">${stopsData[id]?.name || 'Parada #' + id}</span>`;
    item.onclick = () => { document.getElementById('parada').value = id; buscarBusesPorParada(); };
    container.appendChild(item);
  });
}

let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').style.display = sidebarOpen ? 'flex' : 'none';
}

// ═══════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════
window.onload = async () => {
  aplicarTemaGuardado();
  fetch('/bizkaibus').catch(()=>{}); // Despertar servidor proxy local si existiese
  
  await Promise.all([cargarBusInfo(), cargarDatosGTFS()]);
  
  updateFavsUI();
  startPollingCountdown();
  verificarEnlacesProfundos();

  // Soporte de ejecuciones cómodas con tecla Enter
  document.getElementById('linea').addEventListener('keydown', e => { if(e.key === 'Enter') buscarBusesPorLinea(); });
  document.getElementById('parada-nombre').addEventListener('keydown', e => { if(e.key === 'Enter') buscarBusesPorParada(); });
  document.getElementById('numBus').addEventListener('keydown', e => { if(e.key === 'Enter') buscarBusPorNumero(); });
};

</script>
</body>
</html>
